<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#081831"/><stop offset=".5" stop-color="#0D2C57"/><stop offset="1" stop-color="#1560B4"/>
</linearGradient>
<linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#2E86E8" stop-opacity="0"/><stop offset="1" stop-color="#2E86E8" stop-opacity=".45"/>
</linearGradient>
</defs>
<rect width="1600" height="900" fill="url(#sky)"/>
